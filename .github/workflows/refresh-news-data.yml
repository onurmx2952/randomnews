name: Refresh News Data

on:
  schedule:
    - cron: "0 */6 * * *"   # Her 6 saatte bir çalışır
  workflow_dispatch:        # Elle tetikleme

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: |
          pip install -r requirements.txt

      - name: Haberleri çek
        run: |
          python generate_news_json.py

      - name: Değişiklik varsa commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add news.json

          if git diff --cached --quiet; then
            echo "Değişiklik yok"
          else
            git commit -m "news.json otomatik güncellendi"
            git push
          fi
