name: Refresh News Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: |
          pip install -r requirements.txt

      - name: Haberleri çek
        run: |
          python generate_news_json.py

      - name: Dosya var mı kontrol et
        run: |
          if [ ! -f news.json ]; then
            echo "news.json oluşmadı ❌"
            exit 1
          fi

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add news.json

          if git diff --cached --quiet; then
            echo "Değişiklik yok"
          else
            git commit -m "news.json güncellendi"
            git push
          fi
